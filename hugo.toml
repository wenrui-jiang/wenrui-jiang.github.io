baseURL = "https://wenrui-jiang.github.io/"
languageCode = "en"
DefaultContentLanguage = "en"
title = "Website of Wenrui Jiang"

[languages]
[languages.en]
languageName = "English"
languageCode = "en"
contentDir = "content/english"
title = "Jiang Wenrui's Website"
weight = 1

[languages.zh]
languageName = "中文"
languageCode = "zh"
contentDir = "content/Chinese"
title = "蒋文睿的网站"
weight = 2

# theme as hugo module
#theme = "github.com/lxndrblz/anatole"
# theme as git submodule
theme = "github.com/lxndrblz/anatole"

summarylength = 10
enableEmoji = true
enableRobotsTXT = true

# Syntax highlighting
pygmentsUseClasses = true   
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true

# Localized dates requires Hugo version 0.87.0
localizedDates = false

[markup]
    [markup.goldmark]
      [markup.goldmark.renderer]
        unsafe=true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

[taxonomies]
    category = "categories"
    series = "series"
    tag = "tags"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
[[related.indices]]
  name = 'keywords'
  weight = 100
[[related.indices]]
  name = 'tags'
  weight = 80

[services]
# Enable Disqus.Disqus.Shortname
  [services.disqus]
    #shortname = 'your-disqus-shortname'
# Google Analytics
  [services.googleAnalytics]
    #ID = 'G-MEASUREMENT_ID'
